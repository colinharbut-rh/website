# Static site (plain HTML/CSS/JS) — no build step. Site root is the repo root (index.html).
# If your default branch is `master`, add it under `push.branches` or rename the branch to `main`.
name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  deployments: write
  pull-requests: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: website
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
