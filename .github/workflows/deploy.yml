name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Sort blog, sitemap, optional R2/CDN asset base
        env:
          # Repository variable: public HTTPS origin for R2 (or any CDN) mirroring `assets/` paths.
          RH_ASSETS_BASE_URL: ${{ vars.RH_ASSETS_BASE_URL }}
          # Optional: public origin for PDFs in R2 bucket root (see scripts/apply-resource-r2-pdfs.js).
          RH_RESOURCES_PDF_BASE: ${{ vars.RH_RESOURCES_PDF_BASE }}
        run: npm ci && npm run sort-blog && npm run sitemap && npm run apply-assets-cdn && npm run apply-resource-r2-pdfs

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
