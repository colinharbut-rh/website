  <script>
(function () {
  function cssEscapeSafe(s) {
    try { return CSS.escape(s); } catch (e) { return s.replace(/["\\]/g, "\\$&"); }
  }
  function normalizeTarget(target) {
    // ✅ Ako ti URL i dalje dolazi kao #bi-genius-terms, mapiraj ga na rh-terms
    if (target === "bi-genius-terms") return "rh-terms";
    return target;
  }
  function openTabFromHash() {
    var hash = window.location.hash;
    if (!hash) return;
    var target = hash.slice(1);
    if (!target) return;
    target = normalizeTarget(target);
    // 1) traži custom data-tab="..."
    var sel = '[data-tab="' + cssEscapeSafe(target) + '"]';
    var el = document.querySelector(sel);
    // 2) fallback: traži direktno webflow tab link po data-w-tab
    var tabLink = null;
    if (el) {
      tabLink = (el.classList && el.classList.contains('w-tab-link'))
        ? el
        : (el.querySelector ? el.querySelector('.w-tab-link') : null);
    }
    if (!tabLink) {
      tabLink = document.querySelector('.w-tab-link[data-w-tab="' + cssEscapeSafe(target) + '"]');
    }
    // 3) extra fallback: ako target == rh-terms, probaj naći BILO KOJI element sa data-tab="rh-terms"
    // (ovo ti je “hard fix” da 100% radi)
    if (!tabLink && target === "rh-terms") {
      tabLink = document.querySelector('[data-tab="rh-terms"].w-tab-link, .w-tab-link[data-tab="rh-terms"]');
    }
    if (!tabLink) return;
    var tries = 0;
    (function tryClick() {
      tries++;
      tabLink.click();
      if (!tabLink.classList.contains('w--current') && tries < 20) {
        setTimeout(tryClick, 100);
      }
    })();
  }
  document.addEventListener('DOMContentLoaded', openTabFromHash);
  window.addEventListener('hashchange', openTabFromHash);
})();
</script>
